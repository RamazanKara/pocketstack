services:
  app:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: pocketstack
      POSTGRES_DB: pocketstack
    ports:
      - "5432"
