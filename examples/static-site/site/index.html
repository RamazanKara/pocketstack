<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PocketStack Static Demo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f7f4;
      color: #19201f;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(720px, calc(100vw - 40px));
      line-height: 1.6;
    }
    h1 {
      font-size: clamp(2rem, 8vw, 4.5rem);
      margin: 0 0 16px;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello from PocketStack</h1>
    <p>This nginx Compose service was converted into a static browser-native demo.</p>
  </main>
</body>
</html>
