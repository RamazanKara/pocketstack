name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:runtime
      - run: npm run test:runtime
      - run: go test ./...
      - run: go vet ./...
      - run: go build -o bin/pocketstack ./cmd/pocketstack
      - run: make smoke
